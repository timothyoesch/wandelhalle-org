models:

  Canton:
    name: json
    abbreviation: string length:2 unique
    relationships:
      hasMany: Politician

  Party:
    name: json
    abbreviation: json nullable
    color: string default:'#9CA3AF'
    relationships:
      hasMany: Mandate

  Council:
    name: json
    type: string
    relationships:
      hasMany: Mandate

  Politician:
    canton_id: id nullable
    name: string
    slug: string unique
    bio: text nullable
    avatar_url: string nullable
    relationships:
      belongsTo: Canton
      hasMany: Mandate, Question, Answer

  Mandate:
    politician_id: id
    party_id: id
    council_id: id
    type: enum('candidate', 'elected') default:'candidate'
    start_date: date nullable
    end_date: date nullable
    is_active: boolean default:true
    relationships:
      belongsTo: Politician, Party, Council

  Topic:
    name: json
    slug: json
    relationships:
      belongsToMany: Question

  Question:
    user_id: id
    politician_id: id
    subject: string nullable
    body: text
    status: enum('pending', 'published', 'rejected') default:'pending'
    published_at: timestamp nullable
    relationships:
      belongsTo: User, Politician
      hasMany: Answer, Vote
      belongsToMany: Topic

  Answer:
    question_id: id
    politician_id: id
    body: text
    status: enum('pending', 'published') default:'published'
    relationships:
      belongsTo: Question, Politician

  Vote:
    user_id: id
    question_id: id
    relationships:
      belongsTo: User, Question
