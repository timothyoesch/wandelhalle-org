name: wandelhalle

recipe: laravel
config:
  webroot: api/public
  php: '8.5'
  database: mysql

services:
  app:
    type: node:24
    ssl: true
    build:
      - cd app && npm install
    command: cd app && NODE_TLS_REJECT_UNAUTHORIZED=0 HOST=0.0.0.0 PORT=80 npm run dev

  mailhog:
    type: mailhog
    portforward: false


proxy:
  appserver:
    - api.wandelhalle.lndo.site
  app:
    - app.wandelhalle.lndo.site
