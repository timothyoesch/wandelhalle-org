name: wandelhalle

recipe: laravel
config:
  webroot: api/public
  php: '8.5'
  database: mysql

services:
  app:
    type: node:24
    ssl: true
    build:
      - cd app && npm install

  mailhog:
    type: mailhog
    portforward: false


proxy:
  appserver:
    - api.wandelhalle.lndo.site
  app:
    - app.wandelhalle.lndo.site
